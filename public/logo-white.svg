<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" fill="none">
  <!-- Sunburst rays -->
  <g transform="translate(50, 70)">
    <!-- Center rays radiating outward -->
    <line x1="0" y1="0" x2="-35" y2="-55" stroke="#C9A84C" stroke-width="1.5"/>
    <line x1="0" y1="0" x2="-30" y2="-57" stroke="#C9A84C" stroke-width="1.5"/>
    <line x1="0" y1="0" x2="-25" y2="-58" stroke="#C9A84C" stroke-width="1.5"/>
    <line x1="0" y1="0" x2="-20" y2="-60" stroke="#C9A84C" stroke-width="1.5"/>
    <line x1="0" y1="0" x2="-15" y2="-61" stroke="#C9A84C" stroke-width="1.5"/>
    <line x1="0" y1="0" x2="-10" y2="-62" stroke="#C9A84C" stroke-width="1.5"/>
    <line x1="0" y1="0" x2="-5" y2="-63" stroke="#C9A84C" stroke-width="1.5"/>
    <line x1="0" y1="0" x2="0" y2="-63" stroke="#C9A84C" stroke-width="1.5"/>
    <line x1="0" y1="0" x2="5" y2="-63" stroke="#C9A84C" stroke-width="1.5"/>
    <line x1="0" y1="0" x2="10" y2="-62" stroke="#C9A84C" stroke-width="1.5"/>
    <line x1="0" y1="0" x2="15" y2="-61" stroke="#C9A84C" stroke-width="1.5"/>
    <line x1="0" y1="0" x2="20" y2="-60" stroke="#C9A84C" stroke-width="1.5"/>
    <line x1="0" y1="0" x2="25" y2="-58" stroke="#C9A84C" stroke-width="1.5"/>
    <line x1="0" y1="0" x2="30" y2="-57" stroke="#C9A84C" stroke-width="1.5"/>
    <line x1="0" y1="0" x2="35" y2="-55" stroke="#C9A84C" stroke-width="1.5"/>
    <!-- Base horizontal line -->
    <line x1="-40" y1="0" x2="40" y2="0" stroke="#C9A84C" stroke-width="1.5"/>
  </g>
  <!-- SUN STREET text -->
  <text x="120" y="45" font-family="Georgia, serif" font-size="32" font-weight="300" letter-spacing="4" fill="#FFFFFF">SUN STREET</text>
  <!-- PROPERTIES text -->
  <text x="120" y="72" font-family="Georgia, serif" font-size="18" font-weight="300" letter-spacing="8" fill="#FFFFFF">PROPERTIES</text>
</svg>